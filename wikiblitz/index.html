<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WikiBlitz finder — species missing a Wikipedia article (GBIF × Wikidata × iNaturalist)</title>
<style>
  :root{ --bg:#171d26; --panel:#222a35; --line:#36404e; --text:#e7ecf2; --muted:#9aa6b4; --accent:#2E7D9A; --accent2:#b5532a; --good:#3f9d6d; }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
  a{color:#8fc7dd}
  header{padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px 18px;align-items:baseline}
  header h1{font-size:18px;font-weight:700;margin:0}
  header .tag{font-size:12.5px;color:var(--muted);margin-right:auto}
  .langbox{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
  .tchips{display:flex;flex-wrap:wrap;gap:4px}
  .tchips .tc{display:inline-flex;align-items:center;background:#2b3a44;color:#cfe3ee;border-radius:999px;padding:3px 4px 3px 9px;font-size:12px}
  .tchips .tc span{cursor:pointer;opacity:.65;padding:0 5px;font-weight:700}
  .tchips .tc span:hover{opacity:1}
  #addLang{min-width:0;padding:6px 8px}
  .lc{display:flex;flex-wrap:wrap;gap:5px}
  .lc a,.lc .ok{font-size:11px;padding:2px 8px;border-radius:999px;text-decoration:none}
  .lc a{background:var(--accent2);color:#fff}
  .lc .ok{background:#22332a;color:#9fd7b6}
  select,button,input{font-size:14px;border-radius:8px;border:1px solid var(--line);background:#161c25;color:var(--text);padding:8px 10px}
  select,input{outline:none}
  button{cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button:disabled{opacity:.5;cursor:default}
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap}
  #ctrl{padding:14px 18px;background:#1b222c;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:12px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#161c25;color:var(--muted);font-size:13px;cursor:pointer}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .field{position:relative;min-width:300px;flex:1;max-width:520px}
  .field input,.field select{width:100%}
  .ac{position:absolute;z-index:1000;left:0;right:0;top:calc(100% + 4px);background:#1b222c;border:1px solid var(--line);border-radius:8px;max-height:280px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
  .ac.open{display:block}
  .ac .it{padding:8px 10px;cursor:pointer;border-bottom:1px solid #2a323d;font-size:13px}
  .ac .it:hover,.ac .it.sel{background:#283341}
  .ac .it .sub{color:var(--muted);font-size:11.5px}
  #status{font-size:13px;color:var(--muted);min-height:18px}
  #summary{padding:12px 18px;font-size:14px;display:none;gap:14px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#1b222c}
  #summary b{color:#fff}
  .pill{font-size:12px;padding:3px 9px;border-radius:999px;background:#283341;color:var(--muted)}
  .pill.miss{background:#3a2a22;color:#f0b690}
  .pill.have{background:#22332a;color:#9fd7b6}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .card .ph{height:140px;background:#10151c center/cover no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#7a8694;font-size:12px;text-align:center;padding:0 10px}

<body>
<header>
  <h1 id="appTitle">WikiBlitz finder</h1>
  <span class="tag" id="tagline">Spot species with no Wikipedia article — fuel for your wiki-blitz</span>
  <span class="langbox"><label id="ifaceLbl" for="uilang">Interface</label><select id="uilang"></select></span>
  <span class="langbox"><label id="gapsLbl">Find gaps in</label><span id="targetChips" class="tchips"></span><select id="addLang"></select></span>
</header>

<div id="ctrl">
  <div class="tabs">
    <div class="tab active" data-mode="taxon" id="tabTaxon">Taxon</div>
    <div class="tab" data-mode="country" id="tabCountry">Country</div>
    <div class="tab" data-mode="project" id="tabProject">iNat project</div>
    <div class="tab" data-mode="user" id="tabUser">iNat user</div>
    <div class="tab" data-mode="area" id="tabArea">Area (OSM)</div>
  </div>
  <div class="row">
    <div class="field" id="fieldTaxon">
      <input id="taxonInput" autocomplete="off" placeholder="Taxon name (e.g. Vespidae)…">
      <div class="ac" id="taxonAc"></div>
    </div>
    <div class="field" id="fieldCountry" style="display:none">
      <select id="countrySel"></select>

/* ---------------- helpers ---------------- */
async function jget(url){const r=await fetch(url,{headers:{Accept:"application/json"}});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function sparql(ep,q){const r=await fetch(ep+"?query="+encodeURIComponent(q),{headers:{Accept:"application/sparql-results+json"}});if(!r.ok)throw new Error("SPARQL "+r.status);return (await r.json()).results.bindings;}
const val=(b,k)=>b[k]&&b[k].value;

/* ---------------- autocomplete ---------------- */
function attachAC(input,box,fetchFn,onSelect){
  let items=[],idx=-1,timer=null;
  const close=()=>{box.classList.remove("open");idx=-1;};
  const draw=()=>{box.innerHTML=items.map((it,i)=>`<div class="it${i===idx?' sel':''}" data-i="${i}">${esc(it.label)}<div class="sub">${esc(it.sub||"")}</div></div>`).join("");box.classList.toggle("open",items.length>0);};
  input.addEventListener("input",()=>{
    onSelect(null); const q=input.value.trim();
    clearTimeout(timer); if(q.length<2){items=[];close();return;}
    timer=setTimeout(async()=>{ try{ items=await fetchFn(q); idx=-1; draw(); }catch(e){ items=[];close(); } },280);
  });
  input.addEventListener("keydown",e=>{
    if(!box.classList.contains("open"))return;
    if(e.key==="ArrowDown"){idx=Math.min(idx+1,items.length-1);draw();e.preventDefault();}
    else if(e.key==="ArrowUp"){idx=Math.max(idx-1,0);draw();e.preventDefault();}
    else if(e.key==="Enter"){if(idx>=0){choose(idx);e.preventDefault();}}
    else if(e.key==="Escape"){close();}
  });
  box.addEventListener("mousedown",e=>{const d=e.target.closest(".it");if(d)choose(+d.dataset.i);});
  function choose(i){const it=items[i];input.value=it.label;onSelect(it.value);close();}
  document.addEventListener("click",e=>{if(!box.contains(e.target)&&e.target!==input)close();});
}
const inatTaxon=async q=>{
  const d=await jget(`${INAT}/taxa/autocomplete?q=${encodeURIComponent(q)}&per_page=8`);
  return d.results.map(r=>({label:r.name,sub:(r.rank||"")+(r.preferred_common_name?" · "+r.preferred_common_name:""),value:{name:r.name,rank:r.rank,inatId:r.id}}));
};

  const d=await jget(`${INAT}/projects?q=${encodeURIComponent(q)}&per_page=8`);
  return d.results.map(r=>({label:r.title,sub:(r.slug||"")+(r.place_guess?" · "+r.place_guess:""),value:{id:r.id,title:r.title}}));
}, v=>{selProject=v;});
attachAC($("userInput"),$("userAc"),async q=>{
  const d=await jget(`${INAT}/users/autocomplete?q=${encodeURIComponent(q)}&per_page=8`);
  return d.results.map(r=>({label:r.login,sub:(r.name||"")+(r.observations_count?" · "+r.observations_count+" obs":""),value:{login:r.login}}));
}, v=>{selUser=v;});
attachAC($("areaInput"),$("areaAc"),async q=>{
  const d=await jget(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=jsonv2&addressdetails=1&limit=6`);
  return d.filter(r=>r.osm_type==="relation"||r.osm_type==="way").map(r=>{
    const parts=r.display_name.split(",");
    return {label:parts[0].trim(),sub:parts.slice(1,3).join(",").trim()+" · "+(r.type||r.osm_type),
      value:{type:r.osm_type,id:r.osm_id,country:((r.address&&r.address.country_code)||"").toUpperCase(),name:parts[0].trim()}};});
}, v=>{selArea=v;});

async function gbifKeyOf(name){const m=await jget(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}`);return m.usageKey;}
function inatSpecies(d){return (d.results||[]).filter(r=>["species","subspecies","variety"].includes(r.taxon.rank))
  .map(r=>({key:String(r.taxon.id),name:r.taxon.name,count:r.count}));}

PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?sp ?name WHERE {
  ?sp skos:broader* gbifsp:${key} ; gbif:rank rank:species ; rdfs:label ?name .
} ORDER BY ?name LIMIT ${SCOPE_LIMIT+1}`);
    return {keyType:"gbif",items:rows.map(b=>({key:val(b,"sp").split("/").pop(),name:val(b,"name")}))};
  }
  if(mode==="country"){
    const cc=$("countrySel").value;
    const rows=await sparql(GBIF,`PREFIX gbif: <https://rs.gbif.org/terms/>
PREFIX rank: <https://rs.gbif.org/terms/rank/>
PREFIX status: <https://rs.gbif.org/terms/status/>
PREFIX dwc: <http://rs.tdwg.org/dwc/terms/>
PREFIX dwciri: <http://rs.tdwg.org/dwc/iri/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?sp ?name (COUNT(?occ) AS ?n) WHERE {
  ?occ dwc:countryCode "${cc}" ; dwciri:toTaxon ?sp .
  ?sp gbif:rank rank:species ; rdfs:label ?name .
} GROUP BY ?sp ?name ORDER BY DESC(?n) LIMIT ${SCOPE_LIMIT+1}`);
    return {keyType:"gbif",items:rows.map(b=>({key:val(b,"sp").split("/").pop(),name:val(b,"name"),count:+val(b,"n")}))};
  }
  if(mode==="project"){
    if(!selProject)throw new Error(t.pickProject);
    const d=await jget(`${INAT}/observations/species_counts?project_id=${selProject.id}&per_page=${PROJECT_LIMIT}`);
    return {keyType:"inat",items:inatSpecies(d)};
  }
  if(mode==="user"){
    if(!selUser)throw new Error(t.pickUser);
    const d=await jget(`${INAT}/observations/species_counts?user_id=${encodeURIComponent(selUser.login)}&per_page=${PROJECT_LIMIT}`);
    return {keyType:"inat",items:inatSpecies(d)};
  }
  // area (OSM) + taxon
  if(!selArea)throw new Error(t.pickArea);
  if(!selAreaTaxon)throw new Error(t.pickTaxon);
  const key=await gbifKeyOf(selAreaTaxon.name); if(!key)throw new Error(t.empty);
  const iri=`https://www.openstreetmap.org/${selArea.type}/${selArea.id}`;
  const ccLine=selArea.country?`dwc:countryCode "${selArea.country}" ; `:"";
  const rows=await sparql(OSMP,`PREFIX geo: <http://www.opengis.net/ont/geosparql#>
PREFIX geof: <http://www.opengis.net/def/function/geosparql/>
PREFIX gbifsp: <https://www.gbif.org/species/>
PREFIX gbif: <https://rs.gbif.org/terms/>
PREFIX rank: <https://rs.gbif.org/terms/rank/>
PREFIX status: <https://rs.gbif.org/terms/status/>
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX dwc: <http://rs.tdwg.org/dwc/terms/>
PREFIX dwciri: <http://rs.tdwg.org/dwc/iri/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX wdt: <http://www.wikidata.org/prop/direct/>
SELECT ?sp ?name (COUNT(?occ) AS ?n) WHERE {
  <${iri}> geo:hasGeometry/geo:asWKT ?poly .
  SERVICE <${GBIF}> {
    ?sp skos:broader* gbifsp:${key} ; gbif:rank rank:species ; rdfs:label ?name .
    ?occ dwciri:toTaxon ?sp ; ${ccLine}wdt:P625 ?pt .
  }
  FILTER(geof:sfContains(?poly, ?pt))
} GROUP BY ?sp ?name ORDER BY DESC(?n) LIMIT ${SCOPE_LIMIT+1}`);
  return {keyType:"gbif",items:rows.map(b=>({key:val(b,"sp").split("/").pop(),name:val(b,"name"),count:+val(b,"n")}))};
}

/* ---------------- enrich (Wikidata, multi-language) ---------------- */
async function enrich(items,keyType){
  const prop=keyType==="gbif"?"wdt:P846":"wdt:P3151";
  const values=items.map(i=>`"${i.key}"`).join(" ");
  const langs=targetLangs;
  const binds=langs.map(l=>`  BIND(EXISTS { ?x_${safe(l)} schema:about ?wd ; schema:isPartOf <https://${l}.wikipedia.org/> } AS ?h_${safe(l)})`).join("\n");
  const sel=langs.map(l=>`(SAMPLE(?h_${safe(l)}) AS ?has_${safe(l)})`).join(" ");
  const uiOpt=(UILANG!=="en")?`OPTIONAL { ?aui schema:about ?wd ; schema:isPartOf <https://${UILANG}.wikipedia.org/> ; schema:name ?uiT }`:"";
  const rows=await sparql(WD,`PREFIX wdt: <http://www.wikidata.org/prop/direct/>
PREFIX schema: <http://schema.org/>
SELECT ?key ?wd (SAMPLE(?img) AS ?image) (SAMPLE(?g) AS ?gbif) (SAMPLE(?in) AS ?inat) (SAMPLE(?nc) AS ?ncbi)
       ${sel} (SAMPLE(?enT) AS ?enTitle) (SAMPLE(?uiT) AS ?uiTitle) WHERE {
  VALUES ?key { ${values} }
  ?wd ${prop} ?key .
  OPTIONAL { ?wd wdt:P18 ?img }
  OPTIONAL { ?wd wdt:P846 ?g }
  OPTIONAL { ?wd wdt:P3151 ?in }
  OPTIONAL { ?wd wdt:P685 ?nc }
${binds}
  OPTIONAL { ?aen schema:about ?wd ; schema:isPartOf <https://en.wikipedia.org/> ; schema:name ?enT }
  ${uiOpt}
} GROUP BY ?key ?wd`);
  const map={};
  rows.forEach(b=>{ const has={}; langs.forEach(l=>has[l]=val(b,"has_"+safe(l))==="true");
    map[val(b,"key")]={wd:val(b,"wd").split("/").pop(),image:val(b,"image"),gbif:val(b,"gbif"),inat:val(b,"inat"),ncbi:val(b,"ncbi"),
      has,enTitle:val(b,"enTitle"),uiTitle:val(b,"uiTitle")};});
  return map;
}

/* ---------------- taxonomic status (GBIF) ---------------- */
async function fetchStatus(ids){
  const values=ids.map(id=>`gbifsp:${id}`).join(" ");
  const rows=await sparql(GBIF,`PREFIX gbifsp: <https://www.gbif.org/species/>
PREFIX gbif: <https://rs.gbif.org/terms/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?id (SAMPLE(?status) AS ?st) (SAMPLE(?accName) AS ?acc) WHERE {
  VALUES ?sp { ${values} }
  ?sp gbif:taxonomicStatus ?status0 .
  BIND(STRAFTER(STR(?sp),"species/") AS ?id)
  BIND(STRAFTER(STR(?status0),"status/") AS ?status)
  OPTIONAL { ?sp gbif:acceptedNameUsage ?acc0 . ?acc0 rdfs:label ?accName . }
} GROUP BY ?id`);
  const m={}; rows.forEach(b=>{ m[val(b,"id")]={status:val(b,"st"),accName:val(b,"acc")}; }); return m;
}

/* ---------------- run ---------------- */
async function run(){
  const t=I18N[UILANG];
  if(!targetLangs.length){statusEl.textContent=t.pick;return;}
  $("run").disabled=true; summaryEl.style.display="none"; gridEl.innerHTML=""; $("copy").disabled=true;
  statusEl.textContent=t.scoping;
  try{
    const {items,keyType}=await scopeTaxa();
    const capped=items.length>SCOPE_LIMIT;
    const scope=items.slice(0,SCOPE_LIMIT);
    if(!scope.length){statusEl.textContent=t.empty;$("run").disabled=false;return;}
    statusEl.textContent=fmt(t.checking,{n:scope.length});
    const info=await enrich(scope,keyType);
    let withItem=0, have=0, noItem=0; const missing=[]; const perLang={};
    targetLangs.forEach(l=>perLang[l]=0);
    for(const it of scope){
      const e=info[it.key];
      if(!e){noItem++;continue;}
      withItem++;
      const missLangs=targetLangs.filter(l=>!e.has[l]);
      missLangs.forEach(l=>perLang[l]++);
      if(!missLangs.length){have++;continue;}
      missing.push({...it,...e,missLangs});
    }
    missing.sort((a,b)=>(b.count||0)-(a.count||0) || (b.missLangs.length-a.missLangs.length) || a.name.localeCompare(b.name));
    // GBIF taxonomic status for the tiles (gbif id is the scope key, or the Wikidata P846 id for iNat scopes)
    missing.forEach(m=>{ m.gbifId = keyType==="gbif" ? m.key : m.gbif; });
    const gids=[...new Set(missing.map(m=>m.gbifId).filter(Boolean))];
    if(gids.length){ try{ const st=await fetchStatus(gids); missing.forEach(m=>{ const s=st[m.gbifId]; if(s){ m.status=s.status; m.accName=s.accName; } }); }catch(e){} }
    lastMissing=missing;
    lastRun={withItem,have,noItem,capped};
    applyFilter();
    statusEl.textContent="";
    $("copy").disabled=missing.length===0;
  }catch(e){ statusEl.textContent=fmt(t.err,{m:e.message}); }
  $("run").disabled=false;
}

function applyFilter(){
  const hide=$("hideSyn").checked;
  const vis = hide ? lastMissing.filter(m=>!(m.status && /ynonym/.test(m.status))) : lastMissing;
  lastVisible=vis;
  const perLang={}; targetLangs.forEach(l=>perLang[l]=0);
  vis.forEach(m=>m.missLangs.forEach(l=>perLang[l]++));
  renderSummary({missing:vis.length,withItem:lastRun.withItem,have:lastRun.have,noItem:lastRun.noItem,capped:lastRun.capped,perLang});
  renderCards(vis);
  $("copy").disabled=vis.length===0;
}
function renderSummary({missing,withItem,have,noItem,capped,perLang}){
  const t=I18N[UILANG];
  let h=`<span>${fmt(t.result,{missing,withItem})}</span>`;
  h+=`<span class="pill have">${fmt(t.have,{have})}</span>`;
  targetLangs.forEach(l=>{ if(perLang[l]) h+=`<span class="pill miss">${esc(langName(l))}: ${perLang[l]}</span>`; });
  if(noItem)h+=`<span class="pill">${fmt(t.noItem,{n:noItem})}</span>`;
  if(capped)h+=`<span class="pill">${fmt(t.capped,{n:SCOPE_LIMIT})}</span>`;
  summaryEl.innerHTML=h; summaryEl.style.display="flex";
  if(missing===0) gridEl.innerHTML=`<div class="empty">${t.nothing}</div>`;
}

function createUrl(name,lang){return `https://${lang}.wikipedia.org/w/index.php?title=${encodeURIComponent(name)}&action=edit`;}
function translateLink(e){
  const lang=e.missLangs[0]; if(!lang)return null;
  let src=null,title=null;
  if(e.uiTitle&&UILANG!==lang){src=UILANG;title=e.uiTitle;}
  else if(e.enTitle&&lang!=="en"){src="en";title=e.enTitle;}
  if(!src)return null;
  return {lang,src,url:`https://${lang}.wikipedia.org/wiki/Special:ContentTranslation?from=${src}&to=${lang}&page=${encodeURIComponent(title.replace(/ /g,"_"))}`};
}
function statusBadge(e){
  if(!e.status) return "";
  const s=e.status, cls = s==="accepted"?"ok" : /ynonym/.test(s)?"syn" : "other";
  const label=s.replace(/([a-z])([A-Z])/g,"$1 $2").toLowerCase();
  const acc=(cls!=="ok"&&e.accName)?(" &rarr; <i>"+esc(e.accName)+"</i>"):"";
  return `<span class="st ${cls}" title="GBIF taxonomic status">${esc(label)}${acc}</span>`;
}
function renderCards(missing){
  const t=I18N[UILANG];
  gridEl.innerHTML=missing.map(e=>{
    const img=e.image
      ?`<div class="ph" style="background-image:url('${esc(e.image.replace(/^http:/,'https:'))}?width=300')"></div>`
      :`<a class="ph" href="https://andrawaag.github.io/tarsier/index.html?qid=${e.wd}" target="_blank" rel="noopener" title="Tarsier — find &amp; upload an openly-licensed image"><span class="find">${t.findImg} ↗</span></a>`;
    const gbif=e.gbif||(/^\d+$/.test(e.key)&&e.key);
    const ids=[`<a href="https://www.wikidata.org/wiki/${e.wd}" target="_blank" rel="noopener">${e.wd}</a>`];
    if(gbif)ids.push(`<a href="https://www.gbif.org/species/${gbif}" target="_blank" rel="noopener">GBIF</a>`);
    if(e.inat)ids.push(`<a href="https://www.inaturalist.org/taxa/${e.inat}" target="_blank" rel="noopener">iNat</a>`);
    if(e.ncbi)ids.push(`<a href="https://www.ncbi.nlm.nih.gov/Taxonomy/Browser/wwwtax.cgi?id=${e.ncbi}" target="_blank" rel="noopener">NCBI</a>`);
    const chips=targetLangs.map(l=> e.has[l]
      ? `<span class="ok" title="${esc(langName(l))}">✓ ${l}</span>`
      : `<a href="${createUrl(e.name,l)}" target="_blank" rel="noopener" title="${esc(t.create)} — ${esc(langName(l))}">✎ ${l}</a>`).join("");
    const tr=translateLink(e);
    const acts=[];
    if(tr)acts.push(`<a class="tr" href="${tr.url}" target="_blank" rel="noopener">${t.translate} ${tr.lang} ← ${esc(langName(tr.src))}</a>`);
    acts.push(`<a href="https://www.wikidata.org/wiki/${e.wd}" target="_blank" rel="noopener">${t.wd}</a>`);
    return `<div class="card">${img}<div class="body">
      <div class="nm">${esc(e.name)}</div>
      ${statusBadge(e)}
      ${e.count?`<div class="cnt">${fmt(t.occ,{n:e.count.toLocaleString(UILANG)})}</div>`:""}
      <div class="lc">${chips}</div>
      <div class="acts">${acts.join("")}</div>
      <div class="ids">${ids.join("")}</div>
    </div></div>`;
  }).join("");
}

function copyList(){
  const t=I18N[UILANG], cols=targetLangs;
  const st=e=>e.status?(e.status+((e.status!=="accepted"&&e.accName)?(" → "+e.accName):"")):"";
  const head=`| Species | Status | Wikidata | ${cols.join(" | ")} |\n|---|---|---|${cols.map(()=>"---").join("|")}|`;
  const rows=lastVisible.map(e=>`| *${e.name}* | ${st(e)} | [${e.wd}](https://www.wikidata.org/wiki/${e.wd}) | `+
    cols.map(l=>e.has[l]?"✅":`[❌](${createUrl(e.name,l)})`).join(" | ")+" |");
  const md=`# WikiBlitz worklist\n\nMissing-article check across: ${cols.join(", ")}\n\n${head}\n${rows.join("\n")}\n`;
  navigator.clipboard.writeText(md).then(()=>{const b=$("copy");b.textContent=t.copied;setTimeout(()=>b.textContent=t.copy,1500);});
}

/* ---------------- wiring ---------------- */
document.querySelectorAll(".tab").forEach(tab=>tab.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  tab.classList.add("active"); mode=tab.dataset.mode;
  $("fieldTaxon").style.display=mode==="taxon"?"":"none";
  $("fieldCountry").style.display=mode==="country"?"":"none";
  $("fieldProject").style.display=mode==="project"?"":"none";
  $("fieldUser").style.display=mode==="user"?"":"none";
  $("fieldArea").style.display=mode==="area"?"":"none";
  $("fieldAreaTaxon").style.display=mode==="area"?"":"none";
  if(summaryEl.style.display!=="flex") statusEl.textContent = mode==="area"?I18N[UILANG].areaHint:I18N[UILANG].pick;
});
$("run").onclick=run;
$("copy").onclick=copyList;
$("hideSyn").onchange=()=>{ if(lastRun) applyFilter(); };
$("targetChips").onclick=e=>{const x=e.target.closest('span[data-l]');if(!x)return;
  if(targetLangs.length<=1)return; targetLangs=targetLangs.filter(l=>l!==x.dataset.l); renderTargetChips(); fillAddLang();};
$("addLang").onchange=()=>{const v=$("addLang").value; if(v&&!targetLangs.includes(v)){targetLangs.push(v);renderTargetChips();fillAddLang();}};
$("uilang").onchange=()=>{UILANG=$("uilang").value;rebuildNames();
  fillLangSelect($("uilang"),UILANG);fillCountries();renderTargetChips();fillAddLang();applyI18n();};

fillLangSelect($("uilang"),UILANG);
fillCountries();
renderTargetChips();
fillAddLang();
applyI18n();
</script>
